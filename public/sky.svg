<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#5BBCE8"/>
      <stop offset="45%"  stop-color="#85CEEF"/>
      <stop offset="100%" stop-color="#B8E4F7"/>
    </linearGradient>
    <!-- Soft edge for cloud bases -->
    <filter id="f-soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <!-- Very slight blur for cloud tops -->
    <filter id="f-crisp" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <rect width="1440" height="900" fill="url(#sky)"/>

  <!-- ═══ CLOUD 1 — large, left ═══ -->
  <g filter="url(#f-soft)">
    <!-- base / shadow layer -->
    <ellipse cx="220" cy="178" rx="145" ry="38" fill="#d4edf8" opacity="0.9"/>
  </g>
  <g filter="url(#f-crisp)">
    <!-- fluffy bumps -->
    <circle cx="115" cy="158" r="38" fill="white" opacity="0.95"/>
    <circle cx="155" cy="145" r="48" fill="white" opacity="0.97"/>
    <circle cx="200" cy="138" r="52" fill="white" opacity="0.97"/>
    <circle cx="248" cy="142" r="46" fill="white" opacity="0.95"/>
    <circle cx="290" cy="150" r="40" fill="white" opacity="0.93"/>
    <circle cx="325" cy="160" r="33" fill="white" opacity="0.90"/>
    <!-- fill base -->
    <ellipse cx="220" cy="178" rx="148" ry="36" fill="white" opacity="0.97"/>
  </g>

  <!-- ═══ CLOUD 2 — medium, upper-right ═══ -->
  <g filter="url(#f-soft)">
    <ellipse cx="1130" cy="132" rx="120" ry="32" fill="#d4edf8" opacity="0.85"/>
  </g>
  <g filter="url(#f-crisp)">
    <circle cx="1035" cy="115" r="32" fill="white" opacity="0.93"/>
    <circle cx="1070" cy="104" r="42" fill="white" opacity="0.95"/>
    <circle cx="1112" cy="97"  r="46" fill="white" opacity="0.97"/>
    <circle cx="1155" cy="101" r="40" fill="white" opacity="0.95"/>
    <circle cx="1193" cy="110" r="34" fill="white" opacity="0.92"/>
    <circle cx="1225" cy="120" r="27" fill="white" opacity="0.88"/>
    <ellipse cx="1130" cy="132" rx="122" ry="30" fill="white" opacity="0.97"/>
  </g>

  <!-- ═══ CLOUD 3 — small, centre ═══ -->
  <g filter="url(#f-soft)">
    <ellipse cx="700" cy="240" rx="90" ry="26" fill="#d4edf8" opacity="0.75"/>
  </g>
  <g filter="url(#f-crisp)">
    <circle cx="630" cy="225" r="26" fill="white" opacity="0.88"/>
    <circle cx="660" cy="216" r="34" fill="white" opacity="0.92"/>
    <circle cx="697" cy="210" r="38" fill="white" opacity="0.94"/>
    <circle cx="736" cy="214" r="32" fill="white" opacity="0.90"/>
    <circle cx="765" cy="222" r="26" fill="white" opacity="0.85"/>
    <ellipse cx="700" cy="240" rx="92" ry="24" fill="white" opacity="0.95"/>
  </g>

  <!-- ═══ CLOUD 4 — medium-large, right ═══ -->
  <g filter="url(#f-soft)">
    <ellipse cx="1320" cy="210" rx="108" ry="30" fill="#d4edf8" opacity="0.80"/>
  </g>
  <g filter="url(#f-crisp)">
    <circle cx="1235" cy="196" r="30" fill="white" opacity="0.88"/>
    <circle cx="1268" cy="185" r="40" fill="white" opacity="0.92"/>
    <circle cx="1308" cy="178" r="44" fill="white" opacity="0.95"/>
    <circle cx="1350" cy="182" r="38" fill="white" opacity="0.92"/>
    <circle cx="1388" cy="192" r="30" fill="white" opacity="0.87"/>
    <ellipse cx="1320" cy="210" rx="110" ry="28" fill="white" opacity="0.96"/>
  </g>

  <!-- ═══ CLOUD 5 — wispy small, far left ═══ -->
  <g filter="url(#f-soft)">
    <ellipse cx="60" cy="310" rx="70" ry="22" fill="#d4edf8" opacity="0.70"/>
  </g>
  <g filter="url(#f-crisp)">
    <circle cx="20"  cy="300" r="22" fill="white" opacity="0.82"/>
    <circle cx="48"  cy="292" r="30" fill="white" opacity="0.87"/>
    <circle cx="78"  cy="288" r="32" fill="white" opacity="0.88"/>
    <circle cx="108" cy="294" r="26" fill="white" opacity="0.83"/>
    <ellipse cx="65" cy="310" rx="72" ry="20" fill="white" opacity="0.92"/>
  </g>

  <!-- ═══ CLOUD 6 — tiny, upper-centre ═══ -->
  <g filter="url(#f-crisp)" opacity="0.75">
    <circle cx="900" cy="85"  r="20" fill="white"/>
    <circle cx="925" cy="78"  r="26" fill="white"/>
    <circle cx="955" cy="74"  r="28" fill="white"/>
    <circle cx="985" cy="77"  r="22" fill="white"/>
    <circle cx="1008" cy="86" r="17" fill="white"/>
    <ellipse cx="955" cy="96" rx="72" ry="18" fill="white"/>
  </g>
</svg>
